# Builds Ghost Worker desktop installers after publish-public.sh force-pushes to main.
# Creates a GitHub Release with Windows / macOS / Linux artifacts.

name: Ghost Worker Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ghost-worker-release
  cancel-in-progress: true

jobs:
  publish-tauri:
    # Only auto-build on sanitized public snapshots (manual runs always allowed).
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.author.name == 'GhostCompute'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            python3 \
            python3-venv \
            python3-pip

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - uses: actions/setup-python@v5
        if: matrix.platform != 'ubuntu-22.04'
        with:
          python-version: '3.12'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/ghost-worker/src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/ghost-worker
          tagName: ghost-worker-build-${{ github.run_number }}
          releaseName: Ghost Worker build ${{ github.run_number }}
          releaseBody: |
            Automated Ghost Worker release from the public snapshot publish.

            - Commit: ${{ github.sha }}
            - Workflow run: ${{ github.run_number }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
